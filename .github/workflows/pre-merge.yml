name: Pre-merge PR checks

on:
    pull_request:
        branches: [main, develop]

jobs:
    build-image:
      runs-on: ubuntu-latest
      
      steps:
        - uses: actions/checkout@v2
  
        - uses: webfactory/ssh-agent@v0.5.2
          with:
            ssh-private-key: ${{ secrets.CI_SSH_PRIVATE_KEY }}
  
        - name: Build image
          uses: docker/build-push-action@v2
          with:
            context: .
            ssh: default
            push: false
            tags: ${{ secrets.REGISTRY_LOGIN_SERVER }}/python-docker-template:pre-merge